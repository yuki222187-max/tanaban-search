<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    /* iOS ホーム画面起動時のセーフエリア対応 */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN",
      "ヒラギノ角ゴ ProN W3", "Yu Gothic", "Meiryo", sans-serif;
    background: #eef2f8;
    color: #1a2330;
    font-size: 17px;
    line-height: 1.4;
    -webkit-text-size-adjust: 100%;
  }
  .app {
    max-width: 720px;
    margin: 0 auto;
    min-height: 100%;
    display: flex;
    flex-direction: column;
  }
  header.search {
    position: sticky;
    top: 0;
    z-index: 10;
    background: linear-gradient(180deg, #ffffff 0%, #f3f6fb 100%);
    padding: 12px 14px 10px;
    border-bottom: 3px solid #1e3a6e;
    box-shadow: 0 2px 8px rgba(30, 58, 110, 0.10);
  }
  .title-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  h1 {
    font-size: 18px;
    margin: 0;
    color: #1e3a6e;
    letter-spacing: 0.04em;
    font-weight: 800;
  }
  h1::before {
    content: '';
    display: inline-block;
    width: 5px;
    height: 17px;
    background: #f5c948;
    border-radius: 2px;
    margin-right: 8px;
    vertical-align: -2px;
  }
  .count {
    font-size: 13px;
    color: #3a5278;
    font-weight: 600;
  }
  .search-input-wrap {
    position: relative;
  }
  input[type="search"] {
    width: 100%;
    padding: 14px 44px 14px 16px;
    font-size: 20px;
    border: 2px solid #b8c4d2;
    border-radius: 10px;
    background: #fafcff;
    color: #1a2330;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  input[type="search"]:focus {
    border-color: #e0b438;
    background: #ffffff;
    box-shadow: 0 0 0 3px rgba(245, 201, 72, 0.32);
  }
  input[type="search"]::-webkit-search-cancel-button { display: none; }
  /* 起動直後の注意喚起パルス（初回のみ・ユーザーが触れたら止まる） */
  @keyframes pulseGold {
    0%   { box-shadow: 0 0 0 0 rgba(245, 201, 72, 0.55); }
    70%  { box-shadow: 0 0 0 14px rgba(245, 201, 72, 0); }
    100% { box-shadow: 0 0 0 0 rgba(245, 201, 72, 0); }
  }
  input.pulse {
    animation: pulseGold 1.4s ease-out 2;
  }
  .clear-btn {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 32px;
    height: 32px;
    border: none;
    border-radius: 50%;
    background: #1e3a6e;
    color: #ffffff;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    display: none;
    padding: 0;
  }
  .clear-btn.show { display: flex; align-items: center; justify-content: center; }
  main {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 10px 14px 32px;
  }
  .empty {
    text-align: center;
    color: #8a96a6;
    padding: 40px 16px;
    font-size: 15px;
  }
  ul.results {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  li.item {
    background: #ffffff;
    border: 1px solid #dde4ee;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 1px 2px rgba(30, 58, 110, 0.04);
  }
  .name {
    flex: 1;
    font-size: 17px;
    font-weight: 500;
    color: #1a2330;
    word-break: break-all;
    line-height: 1.35;
  }
  .name .kana {
    display: block;
    font-size: 12px;
    color: #8a96a6;
    margin-top: 2px;
    font-weight: 400;
  }
  .tana {
    flex-shrink: 0;
    font-size: 22px;
    font-weight: 800;
    color: #1e3a6e;
    background: linear-gradient(135deg, #f5c948 0%, #e0b438 100%);
    padding: 10px 14px;
    border-radius: 10px;
    min-width: 92px;
    text-align: center;
    letter-spacing: 0.02em;
    box-shadow: 0 2px 5px rgba(195, 156, 50, 0.35),
                inset 0 0 0 1.5px rgba(30, 58, 110, 0.18);
    white-space: nowrap;
  }
  .tana.unset {
    background: linear-gradient(135deg, #b8c2d0 0%, #8a96a8 100%);
    color: #ffffff;
    box-shadow: 0 1px 3px rgba(111, 125, 144, 0.25);
    font-size: 18px;
  }
  mark {
    background: #fff0b3;
    color: inherit;
    padding: 0 2px;
    border-radius: 3px;
    font-weight: 700;
    box-shadow: inset 0 -2px 0 #f5c948;
  }
  .more-note {
    text-align: center;
    color: #5a7a98;
    font-size: 13px;
    padding: 10px 0 0;
  }
  /* === 最近の検索 === */
  .recent {
    margin: 8px 0 0;
  }
  .recent-label {
    font-size: 12px;
    color: #1e3a6e;
    font-weight: 700;
    margin: 14px 0 8px;
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .recent-label::before {
    content: '';
    width: 14px;
    height: 14px;
    background: #1e3a6e;
    -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 4a8 8 0 100 16 8 8 0 000-16zm.5 4h-1v5l4 2.4.5-.82-3.5-2.08V8z'/></svg>") center/contain no-repeat;
            mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 4a8 8 0 100 16 8 8 0 000-16zm.5 4h-1v5l4 2.4.5-.82-3.5-2.08V8z'/></svg>") center/contain no-repeat;
  }
  .recent-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .chip {
    border: 1.5px solid #1e3a6e;
    background: #ffffff;
    color: #1e3a6e;
    font-size: 15px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 999px;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
    font-family: inherit;
    transition: background 0.1s, transform 0.05s;
  }
  .chip:active {
    background: #fff4cc;
    border-color: #e0b438;
    transform: scale(0.97);
  }
  .chip.clear-hist {
    border-color: #c8d0db;
    color: #6a7a8c;
    font-size: 13px;
    font-weight: 500;
  }
  .hint {
    text-align: center;
    color: #5a7a98;
    font-size: 13px;
    padding: 18px 0 8px;
  }
  @media (min-width: 600px) {
    h1 { font-size: 20px; }
    .name { font-size: 18px; }
    .tana { font-size: 24px; min-width: 110px; }
  }
</style>
</head>

<div class="app">
  <header class="search">
    <div class="title-row">
      <h1>棚番検索</h1>
      <div class="count" id="count"></div>
    </div>
    <div class="search-input-wrap">
      <input type="search" id="q"
             placeholder="品名・カナで検索（ひらがな/カタカナ/漢字）"
             autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
             inputmode="search" enterkeyhint="search" autofocus>
      <button type="button" class="clear-btn" id="clear" aria-label="クリア">×</button>
    </div>
  </header>
  <main>
    <div class="recent" id="recent"></div>
    <ul class="results" id="results"></ul>
    <div class="more-note" id="moreNote"></div>
  </main>
</div>

  'ｻﾞ':'ザ','ｼﾞ':'ジ','ｽﾞ':'ズ','ｾﾞ':'ゼ','ｿﾞ':'ゾ',
  'ﾀﾞ':'ダ','ﾁﾞ':'ヂ','ﾂﾞ':'ヅ','ﾃﾞ':'デ','ﾄﾞ':'ド',
  'ﾊﾞ':'バ','ﾋﾞ':'ビ','ﾌﾞ':'ブ','ﾍﾞ':'ベ','ﾎﾞ':'ボ',
  'ﾊﾟ':'パ','ﾋﾟ':'ピ','ﾌﾟ':'プ','ﾍﾟ':'ペ','ﾎﾟ':'ポ',
  'ｳﾞ':'ヴ',
  'ｱ':'ア','ｲ':'イ','ｳ':'ウ','ｴ':'エ','ｵ':'オ',
  'ｶ':'カ','ｷ':'キ','ｸ':'ク','ｹ':'ケ','ｺ':'コ',
  'ｻ':'サ','ｼ':'シ','ｽ':'ス','ｾ':'セ','ｿ':'ソ',
  'ﾀ':'タ','ﾁ':'チ','ﾂ':'ツ','ﾃ':'テ','ﾄ':'ト',
  'ﾅ':'ナ','ﾆ':'ニ','ﾇ':'ヌ','ﾈ':'ネ','ﾉ':'ノ',
  'ﾊ':'ハ','ﾋ':'ヒ','ﾌ':'フ','ﾍ':'ヘ','ﾎ':'ホ',
  'ﾏ':'マ','ﾐ':'ミ','ﾑ':'ム','ﾒ':'メ','ﾓ':'モ',
  'ﾔ':'ヤ','ﾕ':'ユ','ﾖ':'ヨ',
  'ﾗ':'ラ','ﾘ':'リ','ﾙ':'ル','ﾚ':'レ','ﾛ':'ロ',
  'ﾜ':'ワ','ｦ':'ヲ','ﾝ':'ン',
  'ｧ':'ァ','ｨ':'ィ','ｩ':'ゥ','ｪ':'ェ','ｫ':'ォ',
  'ｬ':'ャ','ｭ':'ュ','ｮ':'ョ','ｯ':'ッ',
  'ｰ':'ー','｡':'。','｢':'「','｣':'」','､':'、','･':'・'
};

function normalize(s) {
  if (!s) return '';
  let out = '';
  for (let i = 0; i < s.length; i++) {
    const two = s.substr(i, 2);
    if (HANKAKU_KATAKANA[two]) {
      out += HANKAKU_KATAKANA[two];
      i++;
      continue;
    }
    const one = s[i];
    if (HANKAKU_KATAKANA[one]) {
      out += HANKAKU_KATAKANA[one];
      continue;
    }
    out += one;
  }
  // ひらがな → カタカナ
  out = out.replace(/[ぁ-ゖ]/g, ch =>
    String.fromCharCode(ch.charCodeAt(0) + 0x60)
  );
  // 全角英数小文字統一・ASCIIも小文字化
  out = out.replace(/[Ａ-Ｚａ-ｚ０-９]/g, ch =>
    String.fromCharCode(ch.charCodeAt(0) - 0xFEE0)
  );
  out = out.toLowerCase();
  // 連続空白を1つに、両端トリム
  out = out.replace(/\s+/g, '');
  return out;
}

// ===== 前処理 =====
const INDEXED = DATA.map(r => {
  const nn = normalize(r.n);
  const nk = normalize(r.k);
  return { n: r.n, k: r.k, t: r.t, _s: nn + '' + nk };
});

// ===== 検索 =====
const MAX_RESULTS = 50;
const $q = document.getElementById('q');
const $results = document.getElementById('results');
const $count = document.getElementById('count');
const $clear = document.getElementById('clear');
const $more = document.getElementById('moreNote');
const $recent = document.getElementById('recent');

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

// ===== 履歴管理 =====
const HIST_KEY = 'tanaban_recent_v1';
const HIST_MAX = 10;
function loadHist() {
  try { return JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); }
  catch { return []; }
}
function saveHist(q) {
  q = (q || '').trim();
  if (q.length < 1) return;
  let h = loadHist().filter(x => x !== q);
  h.unshift(q);
  h = h.slice(0, HIST_MAX);
  try { localStorage.setItem(HIST_KEY, JSON.stringify(h)); } catch {}
}
function clearHist() {
  try { localStorage.removeItem(HIST_KEY); } catch {}
}

function renderRecent() {
  const h = loadHist();
  if (h.length === 0) {
    $recent.innerHTML = '<div class="hint">品名・カナ・漢字いずれかを入力してください</div>';
    return;
  }
  const chips = h.map(q =>
    `<button class="chip" data-q="${escapeHtml(q)}">${escapeHtml(q)}</button>`
  ).join('');
  $recent.innerHTML =
    '<div class="recent-label">最近の検索</div>' +
    `<div class="recent-chips">${chips}` +
    '<button class="chip clear-hist" data-clear="1">履歴クリア</button>' +
    '</div>';
}

function render(query) {
  const q = (query || '').trim();
  const nq = normalize(q);
  $clear.classList.toggle('show', q.length > 0);

  if (!nq) {
    $results.innerHTML = '';
    $more.textContent = '';
    $count.textContent = `全 ${INDEXED.length} 件`;
    renderRecent();
    return;
  }

  // 検索中は履歴ゾーンを隠す
  $recent.innerHTML = '';

  const hits = [];
  for (let i = 0; i < INDEXED.length; i++) {
    if (INDEXED[i]._s.indexOf(nq) !== -1) {
      hits.push(INDEXED[i]);
      if (hits.length >= MAX_RESULTS + 1) break;
    }
  }

  const shown = hits.slice(0, MAX_RESULTS);
  const hasMore = hits.length > MAX_RESULTS;

  if (shown.length === 0) {
    $results.innerHTML = '';
    $count.textContent = '0 件';
    $more.innerHTML = '<div class="empty">該当する品目が見つかりませんでした</div>';
    return;
  }

  // 元クエリ・正規化クエリ両方でハイライト
  const escQ = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const reOrig = escQ ? new RegExp(escQ, 'gi') : null;

  const html = shown.map(r => {
    let nameHtml = escapeHtml(r.n);
    if (reOrig) nameHtml = nameHtml.replace(reOrig, m => '<mark>' + m + '</mark>');
    const kanaHtml = r.k ? `<span class="kana">${escapeHtml(r.k)}</span>` : '';
    const tanaCls = (r.t === '未設定') ? 'tana unset' : 'tana';
    return `<li class="item">
      <div class="name">${nameHtml}${kanaHtml}</div>
      <div class="${tanaCls}">${escapeHtml(r.t)}</div>
    </li>`;
  }).join('');

  $results.innerHTML = html;
  $count.textContent = hasMore ? `${MAX_RESULTS}+ 件` : `${shown.length} 件`;
  $more.textContent = hasMore
    ? `上位 ${MAX_RESULTS} 件のみ表示しています。キーワードを追加して絞り込んでください。`
    : '';
}

// 入力時：即検索 + 一定時間後に履歴保存
let saveTimer = null;
$q.addEventListener('input', e => {
  render(e.target.value);
  clearTimeout(saveTimer);
  const v = e.target.value.trim();
  if (v.length >= 2) {
    saveTimer = setTimeout(() => saveHist(v), 1500);
  }
});

// Enter：履歴に確定保存＋キーボードを閉じる
$q.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const v = e.target.value.trim();
    if (v) saveHist(v);
    e.target.blur();
  }
});

// クリアボタン
$clear.addEventListener('click', () => {
  $q.value = '';
  render('');
  $q.focus();
});

// 履歴チップのクリック
$recent.addEventListener('click', e => {
  const btn = e.target.closest('button.chip');
  if (!btn) return;
  if (btn.dataset.clear) {
    clearHist();
    renderRecent();
    return;
  }
  const q = btn.dataset.q || '';
  $q.value = q;
  saveHist(q);  // 最上部に押し上げる
  render(q);
  // モバイルでチップタップ時はキーボードを出さない方が見やすい
});

// 初期描画
render('');

// 起動直後フォーカス（PC は確実・iOSは起動直後はOS制限でキーボードは出ない）
function tryFocus() {
  try { $q.focus({ preventScroll: true }); } catch (e) {}
}
window.addEventListener('DOMContentLoaded', tryFocus);
window.addEventListener('load', () => setTimeout(tryFocus, 0));
// 標準スタンドアロン起動時／タブ復帰時にも再フォーカス
window.addEventListener('pageshow', tryFocus);
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) tryFocus();
});

// iOS では autofocus でキーボードは開けない。
// → 「ホーム画面から起動した直後の最初のタップ」を
//    検索欄へのフォーカス操作に肩代わりさせる（ユーザー操作扱いになりキーボードが開く）。
let primed = true;
function unprime() { primed = false; }
$q.addEventListener('focus', unprime);
$q.addEventListener('touchstart', unprime, { passive: true });

document.addEventListener('touchend', (e) => {
  if (!primed) return;
  // 結果カード・履歴チップ・クリアボタンを押した場合はそのまま動かす
  if (e.target.closest('li.item, button, input')) return;
  primed = false;
  tryFocus();  // この呼び出しはタップというユーザー操作内なのでキーボードも開く
}, { passive: true });

// 起動時に検索欄をパルス点滅で目立たせる（タッチで即停止）
$q.classList.add('pulse');
const stopPulse = () => $q.classList.remove('pulse');
$q.addEventListener('focus', stopPulse, { once: true });
document.addEventListener('touchstart', stopPulse, { once: true, passive: true });
</script>
